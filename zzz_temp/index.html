<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="経営コンサルタント清善泰賀による個別診断予約サイト。2026年4月のスケジュール確認とオンラインセッション予約。">
    <title>予約 | 清善 泰賀 (2026)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
    <header>
        <div class="identity">
            <h1>清善 泰賀</h1>
            <p>📍 オンライン (Zoom)</p>
        </div>
        <div class="year-badge">2026</div>
    </header>

    <div class="calendar-month">2026年 4月</div>

    <div class="menu-card">
        <div class="menu-title">経営の盲点を観測する個別診断</div>
        <div class="menu-price">49,500円 <span>(90分)</span></div>
    </div>

    <div class="grid">
        <div class="grid-header">日</div>
        <div class="grid-header">月</div>
        <div class="grid-header">火</div>
        <div class="grid-header">水</div>
        <div class="grid-header">木</div>
        <div class="grid-header">金</div>
        <div class="grid-header">土</div>

        <div class="cell cell-holiday"><span class="day-num">29</span></div>
        <div class="cell cell-holiday"><span class="day-num">30</span></div>
        <div class="cell cell-holiday"><span class="day-num">31</span></div>

        <div class="cell" hx-get="/api/day/2026-04-01" hx-target="#detail">
            <span class="day-num">1</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 14:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">2</span><div class="slot-summary status-none">-</div></div>
        <div class="cell cell-holiday"><span class="day-num">3</span><div class="slot-summary status-none">-</div></div>

        <div class="cell">
            <span class="day-num">4</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 16:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">5</span></div>

        <div class="cell">
            <span class="day-num">6</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 14:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">7</span></div>

        <div class="cell">
            <span class="day-num">8</span>
            <div class="slot-summary status-full">満了</div>
        </div>
    </div>

    <div id="detail"></div>

    <footer>
        日付をタップして詳細を確認してください。
    </footer>
</main>

</body>
</html>
