<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>軽量ポップオーバー検索 UI</title>
    <style>
        :root {
            --primary: #4285F4;
            --text-main: #111111;
            --text-sub: #666666;
            --border: #eeeeee;
            --bg-page: #ffffff;
            --bg-sub: #fafafa;
            --round-md: 12px;
            --space-xs: 8px;
            --space-sm: 12px;
            --space-md: 16px;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
        }

        /* 検索ボックスの土台 */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            padding: var(--space-md);
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: var(--round-md);
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            position: relative;
        }

        /* 1段目：グリッド */
        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-xs);
        }

        /* セレクターボタン */
        .selector-btn {
            background: var(--bg-sub);
            border: 1px solid var(--border);
            border-radius: var(--round-md);
            padding: 10px 14px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            text-align: left;
        }

        .selector-btn:active {
            background: #f0f0f0;
        }

        .label {
            font-size: 0.7rem;
            color: var(--text-sub);
            display: block;
            margin-bottom: 2px;
        }

        .current-value {
            font-weight: bold;
            font-size: 0.95rem;
        }

        /* ポップオーバーパネル本体 */
        .dropdown-panel {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: white;
            border-radius: var(--round-md);
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            border: 1px solid var(--border);
            z-index: 100;
            overflow: hidden;
            
            /* アニメーション用 */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s cubic-bezier(0.33, 1, 0.68, 1);
        }

        .dropdown-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .option-item {
            padding: 14px 16px;
            font-size: 0.9rem;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            transition: background 0.2s;
        }

        .option-item:last-child {
            border-bottom: none;
        }

        .option-item:hover {
            background: #f8f9fa;
        }

        /* 2段目：入力窓 */
        .input-row {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            padding: 0 12px;
            border-radius: 8px;
            margin-top: 4px;
        }

        input[type="text"] {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px 0;
            background: transparent;
            font-size: 1rem;
        }

        .search-icon {
            color: var(--primary);
            font-size: 1.2rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        /* 画面外クリック検知用 */
        #closer {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
        }
    </style>
</head>
<body>

<div id="closer" onclick="closeAll()"></div>

<div class="main-container">
    <div class="search-box">
        <div class="grid-row">
            <div style="position: relative;">
                <div class="selector-btn" onclick="toggleDropdown(event, 'area-panel')">
                    <span class="label">📍 エリア</span>
                    <span id="area-text" class="current-value">指定なし</span>
                </div>
                <div id="area-panel" class="dropdown-panel">
                    <div class="option-item" onclick="selectItem('area', '', '指定なし')">指定なし（全国）</div>
                    <div class="option-item" onclick="selectItem('area', 'tokyo', '東京')">東京</div>
                    <div class="option-item" onclick="selectItem('area', 'kanto', '関東')">関東</div>
                    <div class="option-item" onclick="selectItem('area', 'osaka', '大阪')">大阪</div>
                </div>
            </div>

            <div style="position: relative;">
                <div class="selector-btn" onclick="toggleDropdown(event, 'cat-panel')">
                    <span class="label">🏷 カテゴリ</span>
                    <span id="cat-text" class="current-value">指定なし</span>
                </div>
                <div id="cat-panel" class="dropdown-panel">
                    <div class="option-item" onclick="selectItem('cat', '', '指定なし')">指定なし</div>
                    <div class="option-item" onclick="selectItem('cat', 'wifi', 'Wi-Fiあり')">Wi-Fiあり</div>
                    <div class="option-item" onclick="selectItem('cat', 'quiet', '静かな環境')">静かな環境</div>
                    <div class="option-item" onclick="selectItem('cat', 'power', '電源あり')">電源あり</div>
                </div>
            </div>
        </div>

        <div class="input-row">
            <input type="text" placeholder="店名や特徴で検索...">
            <button class="search-icon">🔍</button>
        </div>
    </div>

    <div style="margin-top: 40px; color: #ccc; text-align: center;">
        <p>リストがここに並びます...</p>
    </div>
</div>

<script>
    function toggleDropdown(event, id) {
        event.stopPropagation();
        const panel = document.getElementById(id);
        const isShow = panel.classList.contains('show');
        
        closeAll();
        
        if (!isShow) {
            panel.classList.add('show');
            document.getElementById('closer').style.display = 'block';
        }
    }

    function selectItem(type, val, label) {
        if (type === 'area') {
            document.getElementById('area-text').innerText = label;
        } else {
            document.getElementById('cat-text').innerText = label;
        }
        closeAll();
    }

    function closeAll() {
        document.querySelectorAll('.dropdown-panel').forEach(p => p.classList.remove('show'));
        document.getElementById('closer').style.display = 'none';
    }
</script>

</body>
</html>
