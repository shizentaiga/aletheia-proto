<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="経営コンサルタント清善泰賀による個別診断予約サイト。2026年4月の最新スケジュールを確認し、オンラインでの個別セッションをご予約いただけます。">
    <title>予約 | 清善 泰賀 (2026)</title>
    <style>
        :root {
            /* コントラスト改善：より濃い青と赤に変更 */
            --primary-color: #0056b3; 
            --bg-light: #f0f7ff;
            --text-main: #1a1a1a; /* より黒く */
            --text-sub: #4d4d4d;  /* コントラスト比を確保 */
            --border-color: #ddd;
            --holiday-bg: #f5f5f5;
            --full-color: #c92a2a; /* 濃い赤 */
            --font-size-tiny: 0.7rem; 
        }

        body {
            font-family: -apple-system, "Segoe UI", "Helvetica Neue", sans-serif;
            line-height: 1.4;
            color: var(--text-main);
            background-color: #f9f9f9;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            padding: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        .identity h1 { font-size: 1.05rem; margin: 0; }
        .identity p { font-size: 0.75rem; margin: 2px 0 0; color: var(--text-sub); }
        .year-badge { background: #333; color: #fff; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }

        /* 月表示の追加スタイル */
        .calendar-month {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0 0 12px 4px;
            color: var(--text-main);
        }

        .menu-card { 
            background: var(--bg-light); border-left: 4px solid var(--primary-color); 
            padding: 10px; border-radius: 4px; margin-bottom: 16px;
        }
        /* コントラスト改善：メニュータイトルを濃く */
        .menu-title { font-size: 0.85rem; font-weight: bold; color: #004085; }
        .menu-price { font-size: 0.95rem; font-weight: bold; margin-top: 2px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            border-top: 1px solid var(--border-color); 
            border-left: 1px solid var(--border-color); 
        }

        .grid-header { 
            background: #f8f9fa; font-size: 0.65rem; padding: 8px 0; 
            text-align: center; border-right: 1px solid var(--border-color); 
            border-bottom: 1px solid var(--border-color); 
            font-weight: bold;
        }
        .grid-header:nth-child(1) { color: var(--full-color); }
        .grid-header:nth-child(7) { color: var(--primary-color); }

        .cell { 
            padding: 6px 2px; 
            border-right: 1px solid var(--border-color); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            min-height: 70px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cell:hover { background: #f0f7ff; }

        .cell-holiday { 
            background: var(--holiday-bg); 
            color: #888; /* 視認可能な範囲でグレーに */
            pointer-events: none;
            cursor: default;
        }

        .day-num { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; padding-left: 4px; }

        .slot-summary { 
            font-size: var(--font-size-tiny); 
            text-align: center; 
            font-weight: bold;
            line-height: 1.3;
        }
        .status-ok { color: var(--primary-color); }
        .status-full { color: var(--full-color); }
        .status-none { color: #767676; font-weight: normal; }

        footer { margin-top: 15px; text-align: center; font-size: 0.75rem; color: var(--text-sub); }
    </style>
</head>
<body>

<main class="container">
    <header>
        <div class="identity">
            <h1>清善 泰賀</h1>
            <p>📍 オンライン (Zoom)</p>
        </div>
        <div class="year-badge">2026</div>
    </header>

    <div class="calendar-month">2026年 4月</div>

    <div class="menu-card">
        <div class="menu-title">経営の盲点を観測する個別診断</div>
        <div class="menu-price">49,500円 <span>(90分)</span></div>
    </div>

    <div class="grid" role="grid">
        <div class="grid-header">日</div><div class="grid-header">月</div><div class="grid-header">火</div><div class="grid-header">水</div><div class="grid-header">木</div><div class="grid-header">金</div><div class="grid-header">土</div>

        <div class="cell cell-holiday"><span class="day-num">29</span></div>
        <div class="cell cell-holiday"><span class="day-num">30</span></div>
        <div class="cell cell-holiday"><span class="day-num">31</span></div>

        <div class="cell" hx-get="/api/day/2026-04-01" hx-target="#detail">
            <span class="day-num">1</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 14:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">2</span><div class="slot-summary status-none">-</div></div>
        <div class="cell cell-holiday"><span class="day-num">3</span><div class="slot-summary status-none">-</div></div>

        <div class="cell">
            <span class="day-num">4</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 16:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">5</span></div>

        <div class="cell">
            <span class="day-num">6</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 14:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">7</span></div>

        <div class="cell">
            <span class="day-num">8</span>
            <div class="slot-summary status-full">満了</div>
        </div>
    </div>

    <div id="detail"></div>

    <footer>
        日付をタップして詳細を確認してください。
    </footer>
</main>

</body>
</html>
