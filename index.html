<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約 | 清善 泰賀 (2026)</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --bg-light: #f0f7ff;
            --text-main: #333;
            --text-sub: #666;
            --border-color: #eee;
            --holiday-bg: #f5f5f5;
            --full-color: #e63946;
            --font-size-tiny: 0.65rem; 
        }

        body {
            font-family: -apple-system, sans-serif;
            line-height: 1.4;
            color: var(--text-main);
            background-color: #f9f9f9;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            padding: 16px;
        }

        /* ① Identity & Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .identity h1 { font-size: 1.05rem; margin: 0; }
        .identity p { font-size: 0.75rem; margin: 2px 0 0; color: var(--text-sub); }
        .year-badge { background: #333; color: #fff; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }

        /* ② Menu Info */
        .menu-card { 
            background: var(--bg-light); border-left: 4px solid var(--primary-color); 
            padding: 10px; border-radius: 4px; margin-bottom: 16px;
        }
        .menu-title { font-size: 0.8rem; font-weight: bold; color: var(--primary-color); }
        .menu-price { font-size: 0.95rem; font-weight: bold; margin-top: 2px; }

        /* ③ Hybrid Calendar Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            grid-auto-rows: 1fr; 
            border-top: 1px solid var(--border-color); 
            border-left: 1px solid var(--border-color); 
        }

        /* 指摘反映：CSS側で曜日の色を自動決定 (Workers側のロジック削減) */
        .grid-header { 
            background: #f8f9fa; font-size: 0.65rem; padding: 6px 0; 
            text-align: center; border-right: 1px solid var(--border-color); 
            border-bottom: 1px solid var(--border-color); 
        }
        .grid-header:nth-child(1) { color: var(--full-color); } /* 日曜 */
        .grid-header:nth-child(7) { color: var(--primary-color); } /* 土曜 */

        .cell { 
            padding: 4px 2px; 
            border-right: 1px solid var(--border-color); 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            min-height: 65px;
            cursor: pointer; /* デフォルトでクリック可能 */
        }

        /* 指摘反映：お休みセルのポインタイベントを無効化 */
        .cell-holiday { 
            background: var(--holiday-bg); 
            color: #ccc; 
            pointer-events: none; /* クリック・タップを反応させない */
            cursor: default;
        }

        .day-num { font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; }

        /* スロット情報 */
        .slot-summary { 
            font-size: var(--font-size-tiny); 
            text-align: center; 
            font-weight: bold;
            line-height: 1.2;
        }
        .status-ok { color: var(--primary-color); }
        .status-full { color: var(--full-color); }
        .status-none { color: #999; font-weight: normal; }

        footer { margin-top: 15px; text-align: center; font-size: 0.7rem; color: var(--text-sub); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="identity">
            <h1>清善 泰賀</h1>
            <p>📍 オンライン (Zoom)</p>
        </div>
        <div class="year-badge">2026</div>
    </header>

    <div class="menu-card">
        <div class="menu-title">経営の盲点を観測する個別診断</div>
        <div class="menu-price">49,500円 <span>(90分)</span></div>
    </div>

    <div class="grid">
        <div class="grid-header">日</div><div class="grid-header">月</div><div class="grid-header">火</div><div class="grid-header">水</div><div class="grid-header">木</div><div class="grid-header">金</div><div class="grid-header">土</div>

        <div class="cell cell-holiday"><span class="day-num">29</span></div>
        <div class="cell cell-holiday"><span class="day-num">30</span></div>
        <div class="cell cell-holiday"><span class="day-num">31</span></div>

        <div class="cell" hx-get="/api/day/2026-04-01" hx-target="#detail">
            <span class="day-num">1</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 14:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">2</span><div class="slot-summary status-none">-</div></div>
        <div class="cell cell-holiday"><span class="day-num">3</span><div class="slot-summary status-none">-</div></div>

        <div class="cell">
            <span class="day-num">4</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 16:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">5</span></div>

        <div class="cell">
            <span class="day-num">6</span>
            <div class="slot-summary status-ok">○ 10:00<br>○ 14:00</div>
        </div>

        <div class="cell cell-holiday"><span class="day-num">7</span></div>

        <div class="cell">
            <span class="day-num">8</span>
            <div class="slot-summary status-full">満了</div>
        </div>
    </div>

    <div id="detail"></div>

    <footer>
        日付をタップして詳細を確認してください。
    </footer>
</div>

</body>
</html>
